<?php
require_once "../includes/auth.php";
require_once "../includes/db.php";

protectPage("prof");

if ($_SERVER["REQUEST_METHOD"] !== "POST") {
    header("Location: gestion_boitier.php");
    exit;
}

$addMac = trim($_POST["add_mac"] ?? "");
$addReseau = trim($_POST["add_reseau"] ?? "");
$etat = trim($_POST["etat"] ?? "disponible");

$ins = $pdo->prepare(
    "INSERT INTO boitier (add_mac, add_reseau, etat)
     VALUES (?, ?, ?)"
);
$ins->execute([
    $addMac !== "" ? $addMac : null,
    $addReseau !== "" ? $addReseau : null,
    $etat !== "" ? $etat : null
]);

header("Location: gestion_boitier.php");
exit;
