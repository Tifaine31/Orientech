<?php
require_once "../includes/auth.php";
require_once "../includes/db.php";

protectPage("prof");

$id = (int)($_GET["id"] ?? 0);
if ($id <= 0) {
    header("Location: gestion_boitier.php");
    exit;
}

$del = $pdo->prepare("DELETE FROM boitier WHERE numero = ?");
$del->execute([$id]);

header("Location: gestion_boitier.php");
exit;
