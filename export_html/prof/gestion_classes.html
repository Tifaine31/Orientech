<!-- Scripts -->
<script>
function retourDashboard() {
    window.location.href = "prof.php";
}

const params = new URLSearchParams(window.location.search);
if (params.get("error") === "1") {
    alert("Erreur: classe déjà existante ou invalide.");
}
if (params.get("error") === "has_students") {
    alert("Impossible de supprimer: retire d’abord les élèves de cette classe.");
}

// Prevent creating a class if it already exists (exact match)
const form = document.querySelector("form[action='gestion_classes_action.php']");
if (form) {
    form.addEventListener("submit", function (e) {
        const input = form.querySelector("input[name='classe']");
        const value = (input?.value || "").trim();
        if (!value) return;
        const options = Array.from(document.querySelectorAll("#classes-list option")).map(o => o.value);
        if (options.includes(value)) {
            e.preventDefault();
            alert("Cette classe existe déjà.");
        }
    });
}
</script>
