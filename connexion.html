<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ORIENTECH95 - Connexion</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS perso -->
    <link rel="stylesheet" href="style.css">

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico?v=1">
    <link rel="shortcut icon" type="image/x-icon" href="/favicon.ico?v=1">
    <link rel="apple-touch-icon" href="/favicon.jpg?v=1">
    <link rel="icon" type="image/jpeg" href="/favicon.jpg?v=1">
</head>

<body>

    <!-- Logo -->
    <div class="container-fluid py-3">
        <img src="logo_complet.png" alt="ORIENTECH95" height="70">
    </div>

    <!-- Login -->
    <div class="container d-flex justify-content-center align-items-center min-vh-100">
        <div class="card shadow border-0 login-card mt-n5">
            <div class="card-body p-4 p-md-5">

                <form id="loginForm" method="post" action="/login.php">

                    <div class="mb-5">
                        <label class="form-label fw-bold text-orientech">Login</label>
                        <input type="text"
                               id="login"
                               name="login"
                               class="form-control rounded-pill bg-secondary text-white"
                               placeholder="John.Doe"
                               required>
                    </div>

                    <div class="mb-5">
                        <label class="form-label fw-bold text-orientech">Mot de passe</label>
                        <input type="password"
                               id="password"
                               name="password"
                               class="form-control rounded-pill bg-secondary text-white"
                               placeholder="************"
                               required>
                    </div>

                    <div class="text-center">
                        <button type="submit"
                                class="btn btn-orientech rounded-pill px-5 py-3">
                            Connexion
                        </button>
                    </div>

                    <p id="errorMessage" class="text-danger text-center mt-4 d-none">
                        Identifiant ou mot de passe incorrect
                    </p>

                </form>

            </div>
        </div>
    </div>

    <!-- Script -->
    <script>
        const params = new URLSearchParams(window.location.search);
        if (params.get("error") === "1") {
            document.getElementById("errorMessage").classList.remove("d-none");
        }
    </script>

</body>
</html>
